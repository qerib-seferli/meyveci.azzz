<!DOCTYPE html>
<html lang="az">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Checkout | Meyvəçi.az</title><link rel="stylesheet" href="./assets/css/style.css" /><link rel="stylesheet" href="./assets/css/checkout.css" /><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><meta name="theme-color" content="#16a34a" /><link rel="manifest" href="./manifest.webmanifest" /><link rel="apple-touch-icon" href="./assets/img/logo/Meyveci-logo.png" /></head>
<body><div id="header"></div><main class="page-shell"><section class="checkout-layout"><div class="stack-area"><section class="card"><h2>Çatdırılma ünvanı</h2><div id="addressList"></div></section><section class="card"><h2>Yeni ünvan əlavə et</h2><form id="addressForm" class="address-form"><input type="text" id="title" placeholder="Ev / Ofis" required /><input type="text" id="fullName" placeholder="Tam ad" /><input type="text" id="phone" placeholder="Telefon" /><input type="text" id="addressLine" placeholder="Ünvan" required /><input type="text" id="apartment" placeholder="Mənzil / blok / mərtəbə" /><textarea id="note" placeholder="Qeyd"></textarea><input type="number" step="0.0000001" id="lat" placeholder="Lat" /><input type="number" step="0.0000001" id="lng" placeholder="Lng" /><label><input type="checkbox" id="isDefault" /> Əsas ünvan et</label><button class="btn btn-soft" type="submit">Ünvanı yadda saxla</button></form></section></div><aside class="card"><h2>Ödəniş və təsdiq</h2><label class="field"><span>Ödəniş üsulu</span><select id="paymentMethod"><option value="cash">Qapıda nağd</option><option value="manual_card">Kart köçürməsi + çek</option><option value="terminal_receipt">POS terminal çeki</option></select></label><div id="cardInfoBox" class="card-soft" style="display:none;margin:12px 0;"><strong>Kart nömrəsi</strong><p style="margin:8px 0 0;word-break:break-word;">0000 0000 0000 0000</p><small class="muted">Buraya sizin real 16 rəqəm kart nömrənizi yazın.</small></div><div id="receiptUploadWrap" style="display:none;"><label class="field"><span>Əməliyyat kodu / açıqlama</span><input id="transactionRef" placeholder="Məs: ABB123456" /></label><label class="field"><span>Çek şəkli</span><input type="file" id="receiptFile" accept="image/*" /></label><div id="receiptStatus" class="muted" style="margin-bottom:12px;">Çek hələ yüklənməyib</div></div><label class="field"><span>Sifariş qeydi</span><textarea id="customerNote" placeholder="Məsələn: zəngi qapıda edin"></textarea></label><button id="placeOrderBtn" class="btn btn-primary btn-full">Sifarişi tamamla</button></aside></section></main><div id="bottomNav"></div><script src="./assets/js/supabase.js"></script><script src="./assets/js/components.js"></script><script src="./assets/js/app.js"></script><script src="./assets/js/auth.js"></script><script src="./assets/js/guards.js"></script><script src="./assets/js/user-api.js"></script><script src="./assets/js/commerce-api.js"></script><script src="./assets/js/checkout.js"></script><script src="./assets/js/chat-api.js"></script><script src="./assets/js/ui-feedback.js"></script><script src="./assets/js/header-live.js"></script><script src="./assets/js/pwa.js"></script><script src="./assets/js/seo.js"></script></body></html>
