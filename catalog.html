<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kataloq | Meyvəçi.az</title>
  <meta name="description" content="Meyvəçi.az məhsul kataloqu" />

  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/catalog.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#16a34a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<body>
  <div id="header"></div>

  <main class="page-shell">
    <section class="catalog-hero card">
      <h1>Kataloq</h1>
      <p>Təzə və keyfiyyətli məhsulları seç, səbətə əlavə et.</p>
    </section>

    <section class="catalog-toolbar card">
      <input type="search" id="searchInput" placeholder="Məhsul axtar..." />
      <select id="categorySelect">
        <option value="">Bütün kateqoriyalar</option>
      </select>
    </section>

    <section id="catalogGrid" class="product-grid"></section>
  </main>

  <div id="bottomNav"></div>

  <script src="./assets/js/supabase.js"></script>
  <script src="./assets/js/components.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script src="./assets/js/user-api.js"></script>
  <script src="./assets/js/catalog.js"></script>
<script src="./assets/js/chat-api.js"></script>
<script src="./assets/js/ui-feedback.js"></script>
