<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daxil ol | Meyvəçi.az</title>
  <meta name="description" content="Meyvəçi.az hesabına daxil olun" />

  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/login.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#16a34a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Meyvəçi.az" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./assets/img/logo/Meyveci-logo.png" />
</head>
<body class="auth-page">
  <main class="auth-layout">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="./assets/img/logo/Meyveci-logo.png" alt="Meyvəçi.az" class="auth-logo" />
        <h1>Meyvəçi.az</h1>
        <p>Hesabına daxil ol və sifarişlərini idarə et</p>
      </div>

      <div id="authMessage" class="auth-message hidden"></div>

      <form id="loginForm" class="auth-form">
        <label>
          <span>Email</span>
          <input type="email" id="email" placeholder="example@mail.com" required />
        </label>

        <label>
          <span>Şifrə</span>
          <input type="password" id="password" placeholder="••••••••" required />
        </label>

        <button type="submit" class="btn btn-primary btn-full">Daxil ol</button>
      </form>

      <div class="auth-links">
        <a href="./forgot-password.html">Şifrəni unutdum</a>
        <a href="./register.html">Qeydiyyat</a>
      </div>

      <div class="auth-divider"><span>və ya</span></div>

      <div class="social-grid">
        <button id="googleLoginBtn" class="btn btn-soft btn-full" type="button">Google ilə daxil ol</button>
        <button id="appleLoginBtn" class="btn btn-soft btn-full" type="button">Apple ilə daxil ol</button>
      </div>

      <div class="auth-divider"><span>OTP giriş</span></div>

      <form id="otpForm" class="auth-form">
        <label>
          <span>Email</span>
          <input type="email" id="otpEmail" placeholder="OTP üçün email" required />
        </label>
        <button type="submit" class="btn btn-outline btn-full">OTP link göndər</button>
      </form>
    </section>
  </main>

  <script src="./assets/js/supabase.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script src="./assets/js/guards.js"></script>
  <script src="./assets/js/login.js"></script>
<script src="./assets/js/chat-api.js"></script>
<script src="./assets/js/ui-feedback.js"></script>
<script src="./assets/js/header-live.js"></script>
<script src="./assets/js/pwa.js"></script>
<script src="./assets/js/seo.js"></script>
</body>
</html>
