<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sifariş detalı | Meyvəçi.az</title>

  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/order-detail.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#16a34a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Meyvəçi.az" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./assets/img/logo/Meyveci-logo.png" />
</head>
<body>
  <div id="header"></div>

  <main class="page-shell">
    <section id="orderBox" class="card">Yüklənir...</section>

    <section class="page-shell" style="padding-top:0;">
  <div class="card">
    <h2>Ödəniş məlumatı</h2>

    <div id="paymentBox">Yüklənir...</div>

    <hr style="border:none;border-top:1px solid #edf2ee;margin:18px 0;" />

    <form id="paymentForm" class="payment-form">
      <label>
        <span>Ödəniş üsulu</span>
        <select id="paymentProvider">
          <option value="manual">manual</option>
          <option value="bank_transfer">bank transfer</option>
          <option value="cash">cash</option>
          <option value="card">card</option>
        </select>
      </label>

      <label>
        <span>Transaction ref</span>
        <input id="transactionRef" type="text" placeholder="Məs: TXN-123456" />
      </label>

      <label>
        <span>Receipt şəkli</span>
        <input id="receiptFile" type="file" accept="image/*,.pdf" />
      </label>

      <button type="submit" class="btn btn-primary">Receipt ilə ödəniş göndər</button>
    </form>
  </div>
</section>
    
  </main>

  <div id="bottomNav"></div>

  <script src="./assets/js/supabase.js"></script>
  <script src="./assets/js/components.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script src="./assets/js/guards.js"></script>
  <script src="./assets/js/user-api.js"></script>
  <script src="./assets/js/order-detail.js"></script>
<script src="./assets/js/chat-api.js"></script>
<script src="./assets/js/ui-feedback.js"></script>
<script src="./assets/js/header-live.js"></script>
<script src="./assets/js/pwa.js"></script>
<script src="./assets/js/seo.js"></script>
<script src="./assets/js/commerce-api.js"></script>
</body>
</html>
