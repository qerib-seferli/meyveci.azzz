<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifrəni unutdum | Meyvəçi.az</title>

  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/login.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#16a34a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Meyvəçi.az" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./assets/img/logo/Meyveci-logo.png" />
</head>
<body class="auth-page">
  <main class="auth-layout">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="./assets/img/logo/Meyveci-logo.png" alt="Meyvəçi.az" class="auth-logo" />
        <h1>Şifrəni sıfırla</h1>
        <p>Email ünvanını daxil et, link göndərək</p>
      </div>

      <div id="authMessage" class="auth-message hidden"></div>

      <form id="forgotForm" class="auth-form">
        <label>
          <span>Email</span>
          <input type="email" id="email" required />
        </label>

        <button type="submit" class="btn btn-primary btn-full">Bərpa linki göndər</button>
      </form>

      <div class="auth-links">
        <a href="./login.html">Geri qayıt</a>
      </div>
    </section>
  </main>

  <script src="./assets/js/supabase.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script src="./assets/js/forgot-password.js"></script>
<script src="./assets/js/chat-api.js"></script>
<script src="./assets/js/ui-feedback.js"></script>
<script src="./assets/js/header-live.js"></script>
<script src="./assets/js/pwa.js"></script>
<script src="./assets/js/seo.js"></script>
</body>
</html>
