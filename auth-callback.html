<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yönləndirilir | Meyvəçi.az</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#16a34a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Meyvəçi.az" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./assets/img/logo/Meyveci-logo.png" />
</head>
<body>
  <main style="min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;">
    <div>
      <h1>Yoxlanılır...</h1>
      <p>Hesab məlumatların yoxlanılır və uyğun hissəyə yönləndirilirsən.</p>
    </div>
  </main>

  <script src="./assets/js/supabase.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script src="./assets/js/guards.js"></script>
  <script>
    (async function () {
      const { data } = await supabaseClient.auth.getSession();

      if (!data.session) {
        window.location.href = "./login.html";
        return;
      }

      await redirectAfterLogin();
    })();
  </script>
<script src="./assets/js/chat-api.js"></script>
<script src="./assets/js/ui-feedback.js"></script>
<script src="./assets/js/header-live.js"></script>
<script src="./assets/js/pwa.js"></script>
<script src="./assets/js/seo.js"></script>
</body>
</html>
