<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canlı Chat | Meyvəçi.az</title>

  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/messages.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#16a34a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Meyvəçi.az" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./assets/img/logo/Meyveci-logo.png" />
</head>
<body>
  <div id="header"></div>

  <main class="messages-shell">
    <section class="messages-layout">
      <aside class="thread-list card">
        <div class="messages-head">
          <h1>Söhbətlər</h1>
          <span id="messageCountBadge" class="badge-dot hidden"></span>
        </div>
        <div id="threadList"></div>
      </aside>

      <section class="chat-panel card">
        <div id="threadHeader" class="chat-header">Thread seç</div>
        <div id="messageList" class="message-list"></div>
        <form id="messageForm" class="message-form">
          <input id="messageInput" type="text" placeholder="Mesaj yaz..." />
          <button class="btn btn-primary" type="submit">Göndər</button>
        </form>
      </section>
    </section>
  </main>

  <div id="bottomNav"></div>

  <script src="./assets/js/supabase.js"></script>
  <script src="./assets/js/components.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script src="./assets/js/guards.js"></script>
  <script src="./assets/js/chat-api.js"></script>
  <script src="./assets/js/ui-feedback.js"></script>
  <script src="./assets/js/messages.js"></script>
<script src="./assets/js/header-live.js"></script>
<script src="./assets/js/pwa.js"></script>
<script src="./assets/js/seo.js"></script>
</body>
</html>
