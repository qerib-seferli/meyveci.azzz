<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bannerlər | Admin</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#16a34a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Meyvəçi.az" />
<link rel="manifest" href="../manifest.webmanifest" />
<link rel="apple-touch-icon" href="../assets/img/logo/Meyveci-logo.png" />
</head>
<body class="admin-page">
  <div class="admin-shell">
    <div id="adminSidebar"></div>
    <main class="admin-main">
      <div class="admin-topbar"><h1>Bannerlər</h1></div>

      <section class="admin-card">
        <form id="bannerForm" class="admin-form grid-2">
          <input id="title" placeholder="Başlıq" required />
          <input id="subtitle" placeholder="Alt başlıq" />
          <input id="linkUrl" placeholder="Link URL" />
          <input id="buttonText" placeholder="Button text" />
          <input id="sortOrder" type="number" value="0" placeholder="Sort" />
          <select id="status">
            <option value="draft">draft</option>
            <option value="active">active</option>
            <option value="inactive">inactive</option>
          </select>
          <input id="imageFile" type="file" accept="image/*" />
          <button class="btn btn-primary" type="submit">Yadda saxla</button>
        </form>
      </section>

      <section class="admin-card" style="margin-top:16px;">
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Başlıq</th>
                <th>Status</th>
                <th>Sort</th>
                <th>Əməliyyat</th>
              </tr>
            </thead>
            <tbody id="bannersTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/guards.js"></script>
  <script src="../assets/js/admin-layout.js"></script>
  <script src="../assets/js/admin-api.js"></script>
  <script src="../assets/js/admin-banners.js"></script>
</body>
</html>
