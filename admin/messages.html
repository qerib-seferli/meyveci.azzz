<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Mesajlar | Meyvəçi.az</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/messages.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#16a34a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Meyvəçi.az" />
<link rel="manifest" href="../manifest.webmanifest" />
<link rel="apple-touch-icon" href="../assets/img/logo/Meyveci-logo.png" />
</head>
<body class="admin-page">
  <div class="admin-shell">
    <div id="adminSidebar"></div>

    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <h1>Mesajlar</h1>
          <p>İstifadəçi və kuryer söhbətləri</p>
        </div>
      </div>

      <section class="messages-layout">
        <aside class="thread-list admin-card">
          <div class="messages-head">
            <h2 style="margin:0;">Thread-lər</h2>
            <span id="messageCountBadge" class="badge-dot hidden"></span>
          </div>
          <div id="threadList"></div>
        </aside>

        <section class="chat-panel admin-card">
          <div id="threadHeader" class="chat-header">Thread seç</div>
          <div id="messageList" class="message-list"></div>
          <form id="messageForm" class="message-form">
            <input id="messageInput" type="text" placeholder="Mesaj yaz..." />
            <button class="btn btn-primary" type="submit">Göndər</button>
          </form>
        </section>
      </section>
    </main>
  </div>

  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/guards.js"></script>
  <script src="../assets/js/admin-layout.js"></script>
  <script src="../assets/js/chat-api.js"></script>
  <script src="../assets/js/ui-feedback.js"></script>
  <script src="../assets/js/admin-messages.js"></script>
</body>
</html>
